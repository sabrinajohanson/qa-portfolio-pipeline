name: Portfolio Pipeline Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── PHASE 1: Traditional QA (parallel, independent jobs) ──────────────────

  dispatch-calculator:
    name: "Phase 1: calculator-playwright"
    runs-on: ubuntu-latest
    outputs:
      run-id: ${{ steps.dispatch.outputs.workflow-id }}
    steps:
      - name: Trigger and wait
        id: dispatch
        uses: the-actions-org/workflow-dispatch@v4
        with:
          workflow: ci.yml
          repo: sabrinajohanson/calculator-playwright
          token: ${{ secrets.ORCHESTRATOR_PAT }}
          wait-for-completion: true
          wait-for-completion-timeout: 10m

  dispatch-saucedemo:
    name: "Phase 1: saucedemo-playwright"
    runs-on: ubuntu-latest
    outputs:
      run-id: ${{ steps.dispatch.outputs.workflow-id }}
    steps:
      - name: Trigger and wait
        id: dispatch
        uses: the-actions-org/workflow-dispatch@v4
        with:
          workflow: ci.yml
          repo: sabrinajohanson/saucedemo-playwright
          token: ${{ secrets.ORCHESTRATOR_PAT }}
          wait-for-completion: true
          wait-for-completion-timeout: 10m

  dispatch-restful-booker:
    name: "Phase 1: restful-booker-restassured"
    runs-on: ubuntu-latest
    outputs:
      run-id: ${{ steps.dispatch.outputs.workflow-id }}
    steps:
      - name: Trigger and wait
        id: dispatch
        uses: the-actions-org/workflow-dispatch@v4
        with:
          workflow: ci.yml
          repo: sabrinajohanson/restful-booker-restassured
          token: ${{ secrets.ORCHESTRATOR_PAT }}
          wait-for-completion: true
          wait-for-completion-timeout: 10m

  # ── PHASE 2: AI QA, mock only (parallel, after Phase 1 completes) ─────────

  dispatch-generator:
    name: "Phase 2: llm-test-case-generator (mock)"
    needs: [dispatch-calculator, dispatch-saucedemo, dispatch-restful-booker]
    runs-on: ubuntu-latest
    outputs:
      run-id: ${{ steps.dispatch.outputs.workflow-id }}
    steps:
      - name: Trigger and wait
        id: dispatch
        uses: the-actions-org/workflow-dispatch@v4
        with:
          workflow: ci-mock.yml
          repo: sabrinajohanson/llm-test-case-generator
          token: ${{ secrets.ORCHESTRATOR_PAT }}
          wait-for-completion: true
          wait-for-completion-timeout: 10m

  dispatch-judge:
    name: "Phase 2: llm-as-judge (mock)"
    needs: [dispatch-calculator, dispatch-saucedemo, dispatch-restful-booker]
    runs-on: ubuntu-latest
    outputs:
      run-id: ${{ steps.dispatch.outputs.workflow-id }}
    steps:
      - name: Trigger and wait
        id: dispatch
        uses: the-actions-org/workflow-dispatch@v4
        with:
          workflow: ci-mock.yml
          repo: sabrinajohanson/llm-as-judge
          token: ${{ secrets.ORCHESTRATOR_PAT }}
          wait-for-completion: true
          wait-for-completion-timeout: 10m

  # ── CONSOLIDATED DASHBOARD ─────────────────────────────────────────────────

  consolidate-report:
    name: "Consolidated Dashboard"
    needs:
      - dispatch-calculator
      - dispatch-saucedemo
      - dispatch-restful-booker
      - dispatch-generator
      - dispatch-judge
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Debug run IDs
        run: |
          echo "calculator: ${{ needs.dispatch-calculator.outputs.run-id }}"
          echo "saucedemo: ${{ needs.dispatch-saucedemo.outputs.run-id }}"
          echo "restful-booker: ${{ needs.dispatch-restful-booker.outputs.run-id }}"
          echo "generator: ${{ needs.dispatch-generator.outputs.run-id }}"
          echo "judge: ${{ needs.dispatch-judge.outputs.run-id }}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download results.json - calculator-playwright
        uses: actions/download-artifact@v5
        with:
          name: results-json
          path: results/calculator-playwright
          github-token: ${{ secrets.ORCHESTRATOR_PAT }}
          repository: sabrinajohanson/calculator-playwright
          run-id: ${{ needs.dispatch-calculator.outputs.run-id }}

      - name: Download results.json - saucedemo-playwright
        uses: actions/download-artifact@v5
        with:
          name: results-json
          path: results/saucedemo-playwright
          github-token: ${{ secrets.ORCHESTRATOR_PAT }}
          repository: sabrinajohanson/saucedemo-playwright
          run-id: ${{ needs.dispatch-saucedemo.outputs.run-id }}

      - name: Download results.json - restful-booker-restassured
        uses: actions/download-artifact@v5
        with:
          name: results-json
          path: results/restful-booker-restassured
          github-token: ${{ secrets.ORCHESTRATOR_PAT }}
          repository: sabrinajohanson/restful-booker-restassured
          run-id: ${{ needs.dispatch-restful-booker.outputs.run-id }}

      - name: Download results.json - llm-test-case-generator
        uses: actions/download-artifact@v5
        with:
          name: results-json
          path: results/llm-test-case-generator
          github-token: ${{ secrets.ORCHESTRATOR_PAT }}
          repository: sabrinajohanson/llm-test-case-generator
          run-id: ${{ needs.dispatch-generator.outputs.run-id }}

      - name: Download results.json - llm-as-judge
        uses: actions/download-artifact@v5
        with:
          name: results-json
          path: results/llm-as-judge
          github-token: ${{ secrets.ORCHESTRATOR_PAT }}
          repository: sabrinajohanson/llm-as-judge
          run-id: ${{ needs.dispatch-judge.outputs.run-id }}

      - name: Generate consolidated dashboard
        run: python scripts/generate_consolidated_dashboard.py

      - name: Send Teams summary notification
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: python scripts/send_teams_summary.py

      - name: Upload dashboard for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy dashboard to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4